---
layout: default
---
<article class="post">
  <header class="post-header">
    <span class="post-date">{{ page.date | date: "%d/%m/%Y" }}</span>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a class="back-link" href="{{ '/' | relative_url }}">&larr; Voltar para todos os posts</a>
</article>
