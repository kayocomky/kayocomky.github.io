---
layout: default
---
<article class="stage">
  <a class="stage-back" href="{{ '/about/' | relative_url }}">&larr; Voltar para Sobre</a>

  <header class="stage-header">
    {% if page.image %}
    <img class="stage-cover" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    {% endif %}
    <h1>{{ page.title }}</h1>
  </header>

  <div class="stage-content">
    {{ content }}
  </div>
</article>
